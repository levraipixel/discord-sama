name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        type: environment
        required: true

concurrency: ${{ inputs.environment || 'staging' }}

permissions:
  id-token: write   # required for OIDC auth with AWS
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lambda dependencies
        working-directory: lambda
        run: npm ci

      - name: Build Lambda
        working-directory: lambda
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-3' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.5'

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ inputs.environment || 'staging' }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION || 'eu-west-3' }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_LOCK_TABLE }}"

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -out=tfplan
        env:
          TF_VAR_discord_public_key: ${{ secrets.DISCORD_PUBLIC_KEY }}
          TF_VAR_discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION || 'eu-west-3' }}
          TF_VAR_environment: ${{ inputs.environment || 'staging' }}

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Register Discord slash commands
        run: node scripts/register-commands.mjs
        env:
          DISCORD_APP_ID: ${{ vars.DISCORD_APP_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}

      - name: Print interactions URL
        working-directory: terraform
        run: |
          echo "Discord Interactions Endpoint URL:"
          terraform output -raw discord_interactions_url
